name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# `env.ACT` is referenced in `if:` conditions (skip harden-runner / artifacts under nektos/act).
# Declaring `ACT` here satisfies Actions linters; on github.com it stays empty (falsy). With act,
# a CLI `--env ACT=true` overrides this per nektos/act precedence over workflow env.
env:
  ACT: ""

jobs:
  backend:
    name: Python Backend
    runs-on: ubuntu-latest
    # Expression form marks the environment as dynamic so Actions language servers skip
    # false-positive "invalid" diagnostics for optional repo secrets (MYTHOSMUD_*_CI).
    # Resolves to the job id (e.g. backend); GitHub creates the environment if missing.
    environment: ${{ github.job }}
    # Optional: Use GitHub Environments for different deployment stages
    # Uncomment and set environment name to use environment-specific secrets:
    # environment: production  # or staging, development
    env:
      UV_PROJECT_ENVIRONMENT: .venv-ci
      UV_LINK_MODE: copy
      # Suppress Node.js punycode deprecation warning (DEP0040) from transitive dependencies
      NODE_OPTIONS: --no-deprecation
      # Database password is test value for CI (self-contained PostgreSQL setup)
      # For production deployments, use GitHub Secrets: ${{ secrets.POSTGRES_PASSWORD }}
      # codeql[hardcoded-credential]: Test password for CI environment only, not used in production
      DATABASE_URL: postgresql+asyncpg://postgres:Cthulhu1@localhost:5432/mythos_unit
      # codeql[hardcoded-credential]: Test password for CI environment only, not used in production
      DATABASE_NPC_URL: postgresql+asyncpg://postgres:Cthulhu1@localhost:5432/mythos_unit
      # Using GitHub Secrets for application secrets (CI-specific naming convention)
      # Provide test defaults if secrets are not set (empty secrets become empty strings in GitHub Actions)
      # codeql[hardcoded-credential]: Test password defaults for CI environment only, not used in production
      MYTHOSMUD_ADMIN_PASSWORD: ${{ secrets.MYTHOSMUD_ADMIN_PASSWORD_CI || 'test-admin-password-for-development' }}
      # codeql[hardcoded-credential]: Test secret defaults for CI environment only, not used in production
      MYTHOSMUD_SECRET_KEY: ${{ secrets.MYTHOSMUD_SECRET_KEY_CI || 'test-secret-key-for-development' }}
      # codeql[hardcoded-credential]: Test JWT secret defaults for CI environment only, not used in production
      MYTHOSMUD_JWT_SECRET: ${{ secrets.MYTHOSMUD_JWT_SECRET_CI || 'test-jwt-secret-key-for-development' }}
      # codeql[hardcoded-credential]: Test reset token secret defaults for CI environment only, not used in production
      MYTHOSMUD_RESET_TOKEN_SECRET: ${{ secrets.MYTHOSMUD_RESET_TOKEN_SECRET_CI || 'test-reset-token-secret-for-development' }}
      # codeql[hardcoded-credential]: Test verification token secret defaults for CI environment only, not used in production
      MYTHOSMUD_VERIFICATION_TOKEN_SECRET: ${{ secrets.MYTHOSMUD_VERIFICATION_TOKEN_SECRET_CI || 'test-verification-token-secret-for-development' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout

      # Parent repo: actions/checkout with github.token. GITHUB_TOKEN is limited to *this* repo (cannot clone sibling
      # private mythosmud_data). See https://docs.github.com/en/actions/security-guides/automatic-token-authentication
      # A PAT scoped only to mythosmud_data must not be the checkout token for MythosMUD (parent fetch would fail).
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      # Private data: shallow git fetch with URL-encoded user:token (second actions/checkout+PAT failed fetch auth on
      # hosted runners).
      - name: Resolve data submodule (repository + commit)
        id: data_submodule
        run: |
          set -euo pipefail
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          suffix="${data_url#https://github.com/}"
          suffix="${suffix%.git}"
          if [ -z "${suffix}" ] || [ "${suffix}" = "${data_url}" ]; then
            echo "::error::submodule.data.url must be https://github.com/OWNER/REPO.git"
            exit 1
          fi
          line=$(git ls-tree HEAD data)
          mode=$(echo "${line}" | awk '{print $1}')
          kind=$(echo "${line}" | awk '{print $2}')
          sha=$(echo "${line}" | awk '{print $3}')
          if [ "${mode}" != "160000" ] || [ "${kind}" != "commit" ] || [ -z "${sha}" ]; then
            echo "::error::Path data is not a git submodule at HEAD (expected gitlink 160000 commit)."
            exit 1
          fi
          echo "repository=${suffix}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Will fetch ${suffix}@${sha}"
      - name: Clone private data into data/
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          pat_trim=$(printf '%s' "${SUBMODULE_PAT}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${pat_trim}" ]; then
            echo "::error::MYTHOSMUD_PAT or PRIVATE_SUBMODULE_PAT is required (Contents: Read on mythosmud_data)."
            exit 1
          fi
          case "${pat_trim}" in
            github_pat_*) git_user="x-access-token" ;;
            *) git_user="${GITHUB_REPOSITORY_OWNER}" ;;
          esac
          repo="${{ steps.data_submodule.outputs.repository }}"
          sha="${{ steps.data_submodule.outputs.sha }}"
          export GIT_USER_Q="${git_user}" PAT_Q="${pat_trim}"
          auth_host=$(python3 -c "import os, urllib.parse as u; x=os.environ['GIT_USER_Q']; y=os.environ['PAT_Q']; print(u.quote(x, safe='') + ':' + u.quote(y, safe=''))")
          unset GIT_USER_Q PAT_Q
          rm -rf data
          mkdir data
          cd data
          git init -q
          git remote add origin "https://${auth_host}@github.com/${repo}.git"
          GIT_TERMINAL_PROMPT=0 git fetch --depth 1 origin "${sha}"
          git checkout -q FETCH_HEAD
          git remote set-url origin "https://github.com/${repo}.git"
          cd ..

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Cache uv virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv-ci
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install dependencies
        run: |
          # UV_PROJECT_ENVIRONMENT tells uv venv to create .venv-ci instead of .venv.
          # Use cached venv only when valid; otherwise create or replace.
          if [ -f .venv-ci/bin/python ]; then
            :  # valid cache, skip creation
          elif [ -d .venv-ci ]; then
            uv venv --clear
          else
            uv venv
          fi
          source .venv-ci/bin/activate
          # Install pip into venv for scripts that expect python -m pip; uv venv doesn't install pip by default
          uv pip install --python .venv-ci/bin/python pip setuptools wheel
          # Use uv pip so [tool.uv] override-dependencies (e.g. python-multipart>=0.0.22 for CVE fixes) are applied.
          # pip would ignore overrides and fail on fastapi-users vs python-multipart conflict.
          uv pip install --python .venv-ci/bin/python -e .
          uv pip install --python .venv-ci/bin/python -e ".[dev]"
          uv pip install --python .venv-ci/bin/python "pytest-mock>=3.14.0" "pytest-xdist>=3.8.0"
          # Verify pytest was installed correctly and show where it's installed
          python -c "import pytest, sys, site; print(f'pytest {pytest.__version__}'); print(f'Python: {sys.executable}'); print(f'Site-packages: {site.getsitepackages()[0] if site.getsitepackages() else site.getusersitepackages()}')"
      - name: Lint with ruff
        run: |
          source .venv-ci/bin/activate
          python -m ruff check --line-length=120 server/
      - name: Type check with mypy
        run: |
          source .venv-ci/bin/activate
          # Use pre-commit to run mypy with identical config to local development
          pre-commit run mypy --all-files
      - name: Dead code check (vulture)
        run: |
          source .venv-ci/bin/activate
          uv run vulture
      - name: Install Playwright browsers
        run: |
          source .venv-ci/bin/activate
          playwright install chromium
          playwright install-deps chromium
      - name: Install PostgreSQL 18
        if: ${{ !env.ACT }}
        run: |
          sudo apt-get update
          sudo apt-get install -y wget lsb-release gnupg
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-18 postgresql-contrib-18
      - name: Start PostgreSQL service and initialize databases
        run: |
          # Determine workspace path (Docker uses /workspace, GitHub Actions uses $GITHUB_WORKSPACE or pwd)
          WORKSPACE_PATH="${GITHUB_WORKSPACE:-/workspace}"
          if [ ! -d "$WORKSPACE_PATH" ]; then
            WORKSPACE_PATH=$(pwd)
          fi
          # Start PostgreSQL - try service command first, fall back to direct start
          service postgresql start 2>/dev/null || \
          (command -v sudo >/dev/null 2>&1 && sudo service postgresql start) || \
          (PGDATA=$(find /var/lib/postgresql -type d -name "main" 2>/dev/null | head -1) && \
           [ -n "$PGDATA" ] && su postgres -c "postgres -D $PGDATA" &) || true
          sleep 3
          pg_isready -U postgres || (sleep 3 && pg_isready -U postgres)
          # Set postgres user password to match DATABASE_URL
          # Use su postgres instead of sudo -u postgres for Docker container compatibility
          # codeql[hardcoded-credential]: Test password for CI PostgreSQL setup, matches DATABASE_URL above
          su postgres -c "psql -c \"ALTER USER postgres PASSWORD 'Cthulhu1';\"" || \
          (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'Cthulhu1';")
          # Initialize database schema and apply migrations
          # Use su postgres for Docker compatibility, fall back to sudo for GitHub Actions
          su postgres -c "psql -v ON_ERROR_STOP=1 -f $WORKSPACE_PATH/db/roles/roles.sql" || \
          (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -v ON_ERROR_STOP=1 -f db/roles/roles.sql)
          su postgres -c "psql -v ON_ERROR_STOP=1 -f $WORKSPACE_PATH/db/databases/databases.sql" || \
          (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -v ON_ERROR_STOP=1 -f db/databases/databases.sql)
          # Apply environment-specific DDL for mythos_unit (schema mythos_unit, not public)
          echo "Applying mythos_unit DDL..."
          if ! su postgres -c "psql -v ON_ERROR_STOP=1 -d mythos_unit -f $WORKSPACE_PATH/db/mythos_unit_ddl.sql" 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              if ! sudo -u postgres psql -v ON_ERROR_STOP=1 -d mythos_unit -f db/mythos_unit_ddl.sql 2>&1; then
                echo "ERROR: Failed to apply mythos_unit DDL"
                exit 1
              fi
            else
              echo "ERROR: Failed to apply mythos_unit DDL"
              exit 1
            fi
          fi
          echo "✓ DDL applied successfully"
          # Verify schema was applied - check for container_item_instance_id in mythos_unit schema
          COLUMN_CHECK=$((command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -t -A -d mythos_unit -c "SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema = 'mythos_unit' AND table_name = 'containers' AND column_name = 'container_item_instance_id');" 2>&1) || \
            (su postgres -c "psql -t -A -d mythos_unit -c \"SELECT EXISTS(SELECT 1 FROM information_schema.columns WHERE table_schema = 'mythos_unit' AND table_name = 'containers' AND column_name = 'container_item_instance_id');\"" 2>&1))
          COLUMN_CHECK=$(echo "$COLUMN_CHECK" | tr -d '[:space:]')
          if [ "$COLUMN_CHECK" != "t" ]; then
            echo "ERROR: container_item_instance_id column not found in mythos_unit.containers after DDL application"
            echo "Column check result: '$COLUMN_CHECK'"
            echo "Verifying mythos_unit.containers table..."
            (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -d mythos_unit -c "SELECT column_name, data_type FROM information_schema.columns WHERE table_schema = 'mythos_unit' AND table_name = 'containers' ORDER BY ordinal_position;") || \
              su postgres -c "psql -d mythos_unit -c \"SELECT column_name, data_type FROM information_schema.columns WHERE table_schema = 'mythos_unit' AND table_name = 'containers' ORDER BY ordinal_position;\""
            exit 1
          fi
          echo "✓ Verified container_item_instance_id column exists in mythos_unit.containers"
          # Seed data: authoritative DML for mythos_unit
          su postgres -c "psql -d mythos_unit -c \"SET search_path TO mythos_unit;\" -f $WORKSPACE_PATH/data/db/mythos_unit_dml.sql" || \
          (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -d mythos_unit -c "SET search_path TO mythos_unit;" -f data/db/mythos_unit_dml.sql)
          # Apply arena zone migration (arena removed from DML; applied via migration)
          su postgres -c "psql -d mythos_unit -v ON_ERROR_STOP=1 -f $WORKSPACE_PATH/data/db/migrations/20260227_add_arena_zone_unit.sql" || \
          (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -d mythos_unit -v ON_ERROR_STOP=1 -f data/db/migrations/20260227_add_arena_zone_unit.sql)
          # Apply aggression_level to npc_definitions (idempotent)
          su postgres -c "psql -d mythos_unit -v ON_ERROR_STOP=1 -f $WORKSPACE_PATH/data/db/migrations/20260310_add_aggression_level_npc_definitions_unit.sql" || \
          (command -v sudo >/dev/null 2>&1 && sudo -u postgres psql -d mythos_unit -v ON_ERROR_STOP=1 -f data/db/migrations/20260310_add_aggression_level_npc_definitions_unit.sql)
      - name: Set up test environment file
        run: |
          # Create .env.unit_test at project root from example for CI
          # CI already has all env vars set, but conftest.py validates the file exists
          if [ -f env.unit_test.example ]; then
            cp env.unit_test.example .env.unit_test
            echo "Created .env.unit_test from example"
          else
            echo "Warning: env.unit_test.example not found, creating minimal .env.unit_test"
            # Use environment variables that are already set in the job env section
            cat > .env.unit_test << 'EOF'
          SERVER_PORT=54731
          EOF
            echo "POSTGRES_SEARCH_PATH=mythos_unit" >> .env.unit_test
            echo "DATABASE_URL=${DATABASE_URL}" >> .env.unit_test
            echo "DATABASE_NPC_URL=${DATABASE_NPC_URL}" >> .env.unit_test
            echo "MYTHOSMUD_ADMIN_PASSWORD=${MYTHOSMUD_ADMIN_PASSWORD}" >> .env.unit_test
            echo "MYTHOSMUD_SECRET_KEY=${MYTHOSMUD_SECRET_KEY}" >> .env.unit_test
            echo "MYTHOSMUD_JWT_SECRET=${MYTHOSMUD_JWT_SECRET}" >> .env.unit_test
            echo "MYTHOSMUD_RESET_TOKEN_SECRET=${MYTHOSMUD_RESET_TOKEN_SECRET}" >> .env.unit_test
            echo "MYTHOSMUD_VERIFICATION_TOKEN_SECRET=${MYTHOSMUD_VERIFICATION_TOKEN_SECRET}" >> .env.unit_test
          fi
      - name: Run tests with coverage
        run: |
          .venv-ci/bin/python scripts/run_test_ci.py 2>&1 | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pytest-log
          path: pytest.log
      - name: Check for excessive warnings
        run: |
          source .venv-ci/bin/activate
          # Temporarily disable --disable-warnings to check warning count
          # Fail if warnings exceed 100 (should be ~72 after fixes)
          # Use --override-ini to temporarily disable --disable-warnings
          WARNING_OUTPUT=$(uv run pytest server/tests/ -m "not slow and not e2e" -n auto --tb=short --override-ini=addopts="--strict-markers --strict-config" 2>&1 || true)
          WARNING_COUNT=$(echo "$WARNING_OUTPUT" | grep -oP '\d+ warnings' | grep -oP '\d+' | tail -1 || echo "0")
          if [ -z "$WARNING_COUNT" ]; then
            WARNING_COUNT=0
          fi
          echo "Warning count: $WARNING_COUNT"
          if [ "$WARNING_COUNT" -gt 100 ]; then
            echo "ERROR: Warning count ($WARNING_COUNT) exceeds threshold (100)"
            echo "$WARNING_OUTPUT" | tail -50
            exit 1
          fi
          echo "✓ Warning count ($WARNING_COUNT) is within acceptable range (≤100)"
      - name: Cache benchmark (LRU cache)
        run: |
          source .venv-ci/bin/activate
          python scripts/bench_cache.py
      - name: Cache benchmark (NPC cache)
        run: |
          source .venv-ci/bin/activate
          python scripts/bench_cache_npc.py
      - name: Cache benchmark (Profession cache)
        run: |
          source .venv-ci/bin/activate
          python scripts/bench_cache_professions.py
      - name: Upload performance metrics
        if: ${{ success() && !env.ACT }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: perf-metrics
          path: artifacts/perf/
      - name: Ensure htmlcov for artifact
        if: ${{ success() && !env.ACT }}
        run: |
          if [ ! -d htmlcov ] || [ -z "$(ls -A htmlcov 2>/dev/null)" ]; then
            if [ -f .coverage ]; then
              echo "htmlcov missing or empty; generating from .coverage..."
              .venv-ci/bin/python -m coverage html -d htmlcov --fail-under=0
            else
              echo "No .coverage or htmlcov; skipping coverage artifact."
              mkdir -p htmlcov
              echo "No coverage data (htmlcov fallback)" > htmlcov/README.txt
            fi
          fi
      - name: Upload coverage report
        if: ${{ success() && !env.ACT }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-html
          path: htmlcov/
      # Partial upload only; codacy-coverage-finalize runs `final` after frontend partial (Codacy docs).
      # Pinned reporter binary (scripts/ensure_codacy_coverage_reporter_ci.sh) avoids curl|bash get.sh.
      # Token presence checked in shell: `secrets` in step `if` is invalid in some Action linters.
      - name: Upload Python coverage to Codacy (partial)
        if: success() && !env.ACT
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -z "${CODACY_PROJECT_TOKEN:-}" ]; then
            echo "::notice::Skipping Codacy partial upload (CODACY_PROJECT_TOKEN unset)."
            exit 0
          fi
          test -f coverage.xml
          CODACY_REPORTER="$(bash scripts/ensure_codacy_coverage_reporter_ci.sh)"
          "${CODACY_REPORTER}" report \
            --project-token "${CODACY_PROJECT_TOKEN}" \
            -l Python \
            -r coverage.xml \
            --partial
      - name: Cleanup PostgreSQL (for act)
        if: ${{ env.ACT }}
        run: |
          # Stop PostgreSQL gracefully when running with act to prevent hang
          service postgresql stop 2>/dev/null || \
          (command -v sudo >/dev/null 2>&1 && sudo service postgresql stop) || \
          pkill -f postgres || true
          sleep 1
      # FastAPI app smoke test removed; not needed for unit tests

  frontend:
    name: React Client
    runs-on: ubuntu-latest
    env:
      # Suppress Node.js punycode deprecation warning (DEP0040) from transitive dependencies
      NODE_OPTIONS: --no-deprecation
    defaults:
      run:
        working-directory: client
    steps:
      - name: Harden the runner (Audit all outbound calls)
        if: ${{ !env.ACT }}
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: client/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Lint with ESLint
        run: |
          npx eslint .
      - name: Dead code check (knip)
        continue-on-error: true # Baseline has many findings; reduce over time, then remove this
        run: npm run knip
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Validate client coverage for Codacy upload
        if: ${{ success() && !env.ACT }}
        working-directory: ${{ github.workspace }}
        run: python3 scripts/validate_codacy_coverage_gate.py --lcov client/coverage/lcov.info --min-lcov-line-rate 0.70
      # --prefix maps Vitest paths (src/...) to client/src/... in the repo (Codacy --prefix).
      - name: Upload JavaScript coverage to Codacy (partial)
        if: success() && !env.ACT
        working-directory: ${{ github.workspace }}
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -z "${CODACY_PROJECT_TOKEN:-}" ]; then
            echo "::notice::Skipping Codacy partial upload (CODACY_PROJECT_TOKEN unset)."
            exit 0
          fi
          test -s client/coverage/lcov.info
          CODACY_REPORTER="$(bash scripts/ensure_codacy_coverage_reporter_ci.sh)"
          # Codacy language names are case-sensitive; Vitest LCOV maps .ts/.tsx — upload for
          # both Javascript and TypeScript per https://docs.codacy.com/coverage-reporter/uploading-coverage-in-advanced-scenarios/
          for LANG in Javascript TypeScript; do
            "${CODACY_REPORTER}" report \
              --project-token "${CODACY_PROJECT_TOKEN}" \
              -l "${LANG}" \
              --force-coverage-parser lcov \
              -r client/coverage/lcov.info \
              --prefix client \
              --partial
          done
      - name: Run E2E tests
        continue-on-error: true # E2E tests require backend server, may fail in frontend-only CI
        run: npm run test
      - name: Build React app
        run: npm run build

  # Single `final` after both partial uploads (see Codacy advanced coverage docs).
  codacy-coverage-finalize:
    name: Codacy coverage finalize
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Job-level `if` cannot use `env` in some Action linters; skip `act` via step `if` + shell guards.
    if: ${{ !cancelled() && needs.backend.result == 'success' && needs.frontend.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Finalize Codacy coverage upload
        if: success() && !env.ACT
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -z "${CODACY_PROJECT_TOKEN:-}" ]; then
            echo "::notice::Skipping Codacy final (CODACY_PROJECT_TOKEN unset)."
            exit 0
          fi
          CODACY_REPORTER="$(bash scripts/ensure_codacy_coverage_reporter_ci.sh)"
          "${CODACY_REPORTER}" final \
            --project-token "${CODACY_PROJECT_TOKEN}"
