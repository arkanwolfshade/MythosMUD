name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # weekly, at midnight UTC on Sunday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout

      # Same split as ci.yml: parent repo with github.token; submodule PAT may be fine-grained to mythosmud_data only.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          token: ${{ github.token }}

      - name: Fetch private data submodule
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MYTHOSMUD_GIT_USERNAME: ${{ secrets.MYTHOSMUD_GIT_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULE_PAT}" ]; then
            echo "::error::MYTHOSMUD_PAT or PRIVATE_SUBMODULE_PAT is required (read access to mythosmud_data only is OK)."
            exit 1
          fi
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          git_user="${MYTHOSMUD_GIT_USERNAME:-${GITHUB_REPOSITORY_OWNER}}"
          pat_trim=$(printf '%s' "$SUBMODULE_PAT" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${pat_trim}" ]; then
            echo "::error::SUBMODULE_PAT is empty after trimming; re-save the repository secret."
            exit 1
          fi
          case "${pat_trim}" in
            github_pat_*) token_user="x-access-token" ;;
            *) token_user="${git_user}" ;;
          esac
          api_code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${pat_trim}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY_OWNER}/mythosmud_data") || api_code="curl_fail"
          echo "::notice::PAT API check mythosmud_data -> HTTP ${api_code} (200=OK; 401=bad token; 403=SSO or scope; 404=no access)"
          restore_plain_data_url() {
            git config --local submodule.data.url "${data_url}" 2>/dev/null || true
          }
          trap restore_plain_data_url EXIT
          export AUTH_USER="${token_user}"
          export AUTH_PAT="${pat_trim}"
          export AUTH_REST="${data_url#https://}"
          auth_url=$(python3 <<'PY'
          import os
          import urllib.parse

          u = os.environ["AUTH_USER"]
          p = os.environ["AUTH_PAT"]
          rest = os.environ["AUTH_REST"]
          print(
              "https://"
              + urllib.parse.quote(u, safe="")
              + ":"
              + urllib.parse.quote(p, safe="")
              + "@"
              + rest
          )
          PY
          )
          unset AUTH_USER AUTH_PAT AUTH_REST
          echo "::notice::Submodule fetch: temporary URL-embedded credentials (runner ignored http.extraheader for clone)."
          git submodule sync --recursive -- data
          git config --local submodule.data.url "${auth_url}"
          GIT_TERMINAL_PROMPT=0 git -c credential.helper= submodule update --init --recursive -- data
          trap - EXIT
          restore_plain_data_url

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Autobuild
        uses: github/codeql-action/autobuild@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
        with:
          category: "/language:${{ matrix.language }}"
