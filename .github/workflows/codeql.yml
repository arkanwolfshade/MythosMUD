name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # weekly, at midnight UTC on Sunday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout

      # Parent: github.token only (GITHUB_TOKEN scoped to this repo).
      # https://docs.github.com/en/actions/security-guides/automatic-token-authentication
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          token: ${{ github.token }}

      - name: Resolve data submodule (repository + commit)
        id: data_submodule
        run: |
          set -euo pipefail
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          suffix="${data_url#https://github.com/}"
          suffix="${suffix%.git}"
          if [ -z "${suffix}" ] || [ "${suffix}" = "${data_url}" ]; then
            echo "::error::submodule.data.url must be https://github.com/OWNER/REPO.git"
            exit 1
          fi
          line=$(git ls-tree HEAD data)
          mode=$(echo "${line}" | awk '{print $1}')
          kind=$(echo "${line}" | awk '{print $2}')
          sha=$(echo "${line}" | awk '{print $3}')
          if [ "${mode}" != "160000" ] || [ "${kind}" != "commit" ] || [ -z "${sha}" ]; then
            echo "::error::Path data is not a git submodule at HEAD (expected gitlink 160000 commit)."
            exit 1
          fi
          echo "repository=${suffix}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Will fetch ${suffix}@${sha}"
      - name: Clone private data into data/
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          pat_trim=$(printf '%s' "${SUBMODULE_PAT}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${pat_trim}" ]; then
            echo "::error::MYTHOSMUD_PAT or PRIVATE_SUBMODULE_PAT is required (Contents: Read on mythosmud_data)."
            exit 1
          fi
          case "${pat_trim}" in
            github_pat_*) git_user="x-access-token" ;;
            *) git_user="${GITHUB_REPOSITORY_OWNER}" ;;
          esac
          repo="${{ steps.data_submodule.outputs.repository }}"
          sha="${{ steps.data_submodule.outputs.sha }}"
          export GIT_USER_Q="${git_user}" PAT_Q="${pat_trim}"
          auth_host=$(python3 -c "import os, urllib.parse as u; x=os.environ['GIT_USER_Q']; y=os.environ['PAT_Q']; print(u.quote(x, safe='') + ':' + u.quote(y, safe=''))")
          unset GIT_USER_Q PAT_Q
          rm -rf data
          mkdir data
          cd data
          git init -q
          git remote add origin "https://${auth_host}@github.com/${repo}.git"
          GIT_TERMINAL_PROMPT=0 git fetch --depth 1 origin "${sha}"
          git checkout -q FETCH_HEAD
          git remote set-url origin "https://github.com/${repo}.git"
          cd ..

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Autobuild
        uses: github/codeql-action/autobuild@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
        with:
          category: "/language:${{ matrix.language }}"
