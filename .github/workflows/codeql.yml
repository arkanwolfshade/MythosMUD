name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # weekly, at midnight UTC on Sunday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout

      # Same split as ci.yml: parent repo with github.token; submodule PAT may be fine-grained to mythosmud_data only.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
          token: ${{ github.token }}

      - name: Fetch private data submodule
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MYTHOSMUD_GIT_USERNAME: ${{ secrets.MYTHOSMUD_GIT_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULE_PAT}" ]; then
            echo "::error::MYTHOSMUD_PAT or PRIVATE_SUBMODULE_PAT is required (read access to mythosmud_data only is OK)."
            exit 1
          fi
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          git_user="${MYTHOSMUD_GIT_USERNAME:-${GITHUB_REPOSITORY_OWNER}}"
          pat_trim=$(printf '%s' "$SUBMODULE_PAT" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${pat_trim}" ]; then
            echo "::error::SUBMODULE_PAT is empty after trimming; re-save the repository secret."
            exit 1
          fi
          git submodule sync --recursive
          git config --local submodule.data.url "${data_url}"
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          basic_b64=$(printf '%s:%s' "${git_user}" "${pat_trim}" | base64 -w0)
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${basic_b64}"
          GIT_TERMINAL_PROMPT=0 git -c credential.helper= submodule update --init --recursive
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Autobuild
        uses: github/codeql-action/autobuild@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ba454b8ab46733eb6145342877cd148270bb77ab # codeql-bundle-v2.23.5
        with:
          category: "/language:${{ matrix.language }}"
