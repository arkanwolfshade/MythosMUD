# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: "Dependency Review"
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout
      # github.token: parent repo only; GITHUB_TOKEN cannot access other private repos (automatic token authentication).
      # https://docs.github.com/en/actions/security-guides/automatic-token-authentication

      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      # Private data: second actions/checkout with PAT (GitHub-documented pattern for another private repo).
      # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
      - name: Require submodule PAT secret
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}
        run: |
          set -euo pipefail
          t=$(printf '%s' "${SUBMODULE_PAT}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${t}" ]; then
            echo "::error::MYTHOSMUD_PAT or PRIVATE_SUBMODULE_PAT is required (Contents: Read on mythosmud_data)."
            exit 1
          fi
      - name: Resolve data submodule (repository + commit)
        id: data_submodule
        run: |
          set -euo pipefail
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          suffix="${data_url#https://github.com/}"
          suffix="${suffix%.git}"
          if [ -z "${suffix}" ] || [ "${suffix}" = "${data_url}" ]; then
            echo "::error::submodule.data.url must be https://github.com/OWNER/REPO.git"
            exit 1
          fi
          line=$(git ls-tree HEAD data)
          mode=$(echo "${line}" | awk '{print $1}')
          kind=$(echo "${line}" | awk '{print $2}')
          sha=$(echo "${line}" | awk '{print $3}')
          if [ "${mode}" != "160000" ] || [ "${kind}" != "commit" ] || [ -z "${sha}" ]; then
            echo "::error::Path data is not a git submodule at HEAD (expected gitlink 160000 commit)."
            exit 1
          fi
          echo "repository=${suffix}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Will checkout ${suffix}@${sha}"
      - name: Checkout private data repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.data_submodule.outputs.repository }}
          ref: ${{ steps.data_submodule.outputs.sha }}
          path: data
          token: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}

      - name: "Dependency Review"
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
