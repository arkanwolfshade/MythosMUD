# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: "Dependency Review"
on: [pull_request]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout

      - name: "Checkout Repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      - name: Fetch private data submodule
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT || secrets.PRIVATE_SUBMODULE_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MYTHOSMUD_GIT_USERNAME: ${{ secrets.MYTHOSMUD_GIT_USERNAME }}
        run: |
          set -euo pipefail
          if [ -z "${SUBMODULE_PAT}" ]; then
            echo "::error::MYTHOSMUD_PAT or PRIVATE_SUBMODULE_PAT is required (read access to mythosmud_data only is OK)."
            exit 1
          fi
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          git_user="${MYTHOSMUD_GIT_USERNAME:-${GITHUB_REPOSITORY_OWNER}}"
          pat_trim=$(printf '%s' "$SUBMODULE_PAT" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${pat_trim}" ]; then
            echo "::error::SUBMODULE_PAT is empty after trimming; re-save the repository secret."
            exit 1
          fi
          git submodule sync --recursive -- data
          git config --local submodule.data.url "${data_url}"
          basic_b64=$(printf '%s:%s' "${git_user}" "${pat_trim}" | base64 -w0)
          cleanup_github_auth_header() {
            git config --global --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          }
          trap cleanup_github_auth_header EXIT
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${basic_b64}"
          GIT_TERMINAL_PROMPT=0 git -c credential.helper= submodule update --init --recursive -- data
          trap - EXIT
          cleanup_github_auth_header

      - name: "Dependency Review"
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
