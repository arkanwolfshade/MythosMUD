# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required,
# PRs introducing known-vulnerable packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
name: "Dependency Review"
on: [pull_request]

# dependency-submission API requires contents:write; id-token for OIDC when uploading snapshots.
permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Opt into Node 24 for JS actions until dependency-review-action ships node24 (see GitHub changelog).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # Standard bootstrap: harden + checkout
      # github.token: parent repo only; GITHUB_TOKEN cannot access other private repos (automatic token authentication).
      # https://docs.github.com/en/actions/security-guides/automatic-token-authentication

      - name: "Checkout Repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}
          # Match PR head commit so submitted snapshots align with dependency-review API head SHA
          # (default PR checkout is the merge commit; github.sha would not match pull_request.head.sha).
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect Python lockfile changes in PR
        id: python_lock_changed
        run: |
          set -euo pipefail
          if git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            -- uv.lock pyproject.toml | grep -q .; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      # Private data: shallow git fetch with URL-encoded user:token (same pattern as ci.yml).
      - name: Resolve data submodule (repository + commit)
        if: steps.python_lock_changed.outputs.changed == 'true'
        id: data_submodule
        run: |
          set -euo pipefail
          data_url="$(git config -f .gitmodules --get submodule.data.url)"
          suffix="${data_url#https://github.com/}"
          suffix="${suffix%.git}"
          if [ -z "${suffix}" ] || [ "${suffix}" = "${data_url}" ]; then
            echo "::error::submodule.data.url must be https://github.com/OWNER/REPO.git"
            exit 1
          fi
          line=$(git ls-tree HEAD data)
          mode=$(echo "${line}" | awk '{print $1}')
          kind=$(echo "${line}" | awk '{print $2}')
          sha=$(echo "${line}" | awk '{print $3}')
          if [ "${mode}" != "160000" ] || [ "${kind}" != "commit" ] || [ -z "${sha}" ]; then
            echo "::error::Path data is not a git submodule at HEAD (expected gitlink 160000 commit)."
            exit 1
          fi
          echo "repository=${suffix}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "::notice::Will fetch ${suffix}@${sha}"
      - name: Clone private data into data/
        if: steps.python_lock_changed.outputs.changed == 'true'
        env:
          SUBMODULE_PAT: ${{ secrets.MYTHOSMUD_PAT }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          pat_trim=$(printf '%s' "${SUBMODULE_PAT}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "${pat_trim}" ]; then
            echo "::error::MYTHOSMUD_PAT is required (Contents: Read on mythosmud_data)."
            exit 1
          fi
          case "${pat_trim}" in
            github_pat_*) git_user="x-access-token" ;;
            *) git_user="${GITHUB_REPOSITORY_OWNER}" ;;
          esac
          repo="${{ steps.data_submodule.outputs.repository }}"
          sha="${{ steps.data_submodule.outputs.sha }}"
          export GIT_USER_Q="${git_user}" PAT_Q="${pat_trim}"
          auth_host=$(python3 -c "import os, urllib.parse as u; x=os.environ['GIT_USER_Q']; y=os.environ['PAT_Q']; print(u.quote(x, safe='') + ':' + u.quote(y, safe=''))")
          unset GIT_USER_Q PAT_Q
          rm -rf data
          mkdir data
          cd data
          git init -q
          git remote add origin "https://${auth_host}@github.com/${repo}.git"
          GIT_TERMINAL_PROMPT=0 git fetch --depth 1 origin "${sha}"
          git checkout -q FETCH_HEAD
          git remote set-url origin "https://github.com/${repo}.git"
          cd ..

      # Vendored node_modules must not be scanned (stale fast-uri@3.1.0 was committed previously); use lockfiles.
      - name: Remove vendored static_data node_modules before snapshot
        if: steps.python_lock_changed.outputs.changed == 'true'
        run: rm -rf scripts/static_data/node_modules

      # Component Detection expands uv.lock into a full snapshot. Running it on npm-only PRs makes
      # Dependency Review treat the entire Python tree as newly added versus main's static graph.
      - name: Submit dependency snapshot (Component Detection)
        if: >-
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.python_lock_changed.outputs.changed == 'true'
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927 # v0.1.1
        with:
          detectorArgs: UvLock=EnableIfDefaultOff,NpmLockfile3=EnableIfDefaultOff

      # Transitive dev deps (e.g. stacktracey via Spectral) may score <3 on OpenSSF; warn only below 2.
      - name: "Dependency Review"
        id: dependency_review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          show-patched-versions: true
          comment-summary-in-pr: on-failure
          warn-on-openssf-scorecard-level: 2
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 300
